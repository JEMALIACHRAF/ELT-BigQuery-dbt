name: "ecommerce_elt"
version: "1.0.0"
config-version: 2

profile: "ecommerce_bigquery"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_elt:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    intermediate:
      +materialized: ephemeral
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]
      finance:
        +materialized: table
      marketing:
        +materialized: table
      product:
        +materialized: table

vars:
  start_date: "2023-01-01"
  currency: "EUR"

seeds:
  ecommerce_elt:
    raw_ecommerce:
      +schema: raw_ecommerce
